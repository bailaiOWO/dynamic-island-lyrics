<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: transparent; color: #fff; overflow: hidden;
    }
    .window {
      background: #0a0a0a; border-radius: 12px; overflow: hidden;
      width: 100%; height: 100vh; display: flex; flex-direction: column;
    }
    .titlebar {
      height: 36px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 14px; -webkit-app-region: drag;
      background: #111; font-size: 12px; color: #555;
    }
    .titlebar-btns { display: flex; gap: 8px; -webkit-app-region: no-drag; }
    .titlebar-btn {
      width: 12px; height: 12px; border-radius: 50%; border: none; cursor: pointer;
      transition: opacity 0.15s;
    }
    .titlebar-btn:hover { opacity: 0.8; }
    .btn-close { background: #ff5f57; }
    .btn-min { background: #febc2e; }

    .player { padding: 20px 20px 16px; display: flex; flex-direction: column; gap: 16px; flex: 1; }
    .song-info { text-align: center; padding: 4px 0; }
    .song-title { font-size: 15px; font-weight: 600; color: #eee; }
    .song-artist { font-size: 11px; color: #555; margin-top: 4px; }

    .progress-wrap {
      position: relative; height: 4px; background: #1a1a1a; border-radius: 2px;
      cursor: pointer; transition: height 0.15s;
    }
    .progress-wrap:hover { height: 6px; }
    .progress-bar {
      height: 100%; background: #fff; border-radius: 2px; width: 0%;
      transition: width 0.15s linear; pointer-events: none;
    }
    .time-row {
      display: flex; justify-content: space-between;
      font-size: 10px; color: #444; margin-top: -8px;
    }

    .controls {
      display: flex; justify-content: center; align-items: center; gap: 28px;
      margin: 2px 0;
    }
    .ctrl-btn {
      background: none; border: none; cursor: pointer; padding: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .ctrl-btn svg { fill: #666; transition: fill 0.15s; }
    .ctrl-btn:hover svg { fill: #fff; }
    .ctrl-btn.play-btn svg { fill: #fff; }
    .ctrl-btn.play-btn:hover svg { fill: #ccc; }

    .volume-row { display: flex; align-items: center; gap: 8px; }
    .volume-row svg { width: 14px; height: 14px; fill: #444; flex-shrink: 0; }
    .volume-slider {
      flex: 1; height: 3px; -webkit-appearance: none; appearance: none;
      background: #1a1a1a; border-radius: 2px; outline: none;
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 10px; height: 10px;
      border-radius: 50%; background: #fff; cursor: pointer;
    }
    .vol-label { font-size: 10px; color: #444; min-width: 24px; text-align: right; }

    .open-btn {
      width: 100%; padding: 10px; background: #111; border: 1px solid #1a1a1a;
      border-radius: 10px; color: #555; cursor: pointer; font-size: 12px;
      transition: all 0.15s; letter-spacing: 0.5px;
    }
    .open-btn:hover { background: #1a1a1a; color: #fff; border-color: #333; }
  </style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <span>Player</span>
      <div class="titlebar-btns">
        <button class="titlebar-btn btn-min" id="minBtn"></button>
        <button class="titlebar-btn btn-close" id="closeBtn"></button>
      </div>
    </div>
    <div class="player">
      <button class="open-btn" id="openBtn">打开音乐文件</button>
      <div class="song-info">
        <div class="song-title" id="title">未加载</div>
        <div class="song-artist" id="artist">--</div>
      </div>
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="time-row">
        <span id="timeCur">0:00</span>
        <span id="timeTotal">0:00</span>
      </div>
      <div class="controls">
        <button class="ctrl-btn" id="prevBtn">
          <svg width="20" height="20" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button class="ctrl-btn play-btn" id="playBtn">
          <svg width="36" height="36" viewBox="0 0 24 24" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="ctrl-btn" id="nextBtn">
          <svg width="20" height="20" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
      </div>
      <div class="volume-row">
        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
        <input type="range" class="volume-slider" id="volume" min="0" max="100" value="80" />
        <span class="vol-label" id="volLabel">80</span>
      </div>
    </div>
  </div>
  <script src="player.js"></script>
</body>
</html>
