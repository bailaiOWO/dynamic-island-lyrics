<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: transparent; color: #fff; overflow: hidden;
    }
    .window {
      background: #0a0a0a; border-radius: 12px; overflow: hidden;
      width: 100%; height: 100vh; display: flex; flex-direction: column;
      position: relative;
    }

    /* Fluid background canvas */
    .fluid-bg {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0;
    }
    .fluid-bg canvas {
      width: 100%; height: 100%;
      filter: blur(50px) saturate(1.8);
      opacity: 0.5;
    }

    .titlebar {
      height: 36px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 14px; -webkit-app-region: drag;
      background: rgba(0,0,0,0.5); font-size: 12px; color: #555; flex-shrink: 0;
      position: relative; z-index: 2;
    }
    .titlebar-btns { display: flex; gap: 8px; -webkit-app-region: no-drag; }
    .titlebar-btn {
      width: 12px; height: 12px; border-radius: 50%; border: none; cursor: pointer;
      transition: opacity 0.15s;
    }
    .titlebar-btn:hover { opacity: 0.8; }
    .btn-close { background: #ff5f57; }
    .btn-min { background: #febc2e; }

    .main-area {
      flex: 1; display: flex; overflow: hidden;
      position: relative; z-index: 1;
    }

    /* Left panel */
    .left-panel {
      width: 340px; flex-shrink: 0; display: flex; flex-direction: column;
      padding: 16px; gap: 10px; overflow-y: auto; overflow-x: hidden;
    }
    .cover-wrap {
      width: 100%; border-radius: 12px; overflow: hidden;
      background: transparent;
    }
    .cover-wrap img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .song-info { text-align: center; }
    .song-title { font-size: 14px; font-weight: 600; color: #eee; }
    .song-artist { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }

    .progress-wrap {
      height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px;
      cursor: pointer; transition: height 0.15s;
    }
    .progress-wrap:hover { height: 6px; }
    .progress-bar {
      height: 100%; background: rgba(255,255,255,0.8); border-radius: 2px; width: 0%;
      transition: width 0.15s linear; pointer-events: none;
    }
    .time-row {
      display: flex; justify-content: space-between;
      font-size: 10px; color: rgba(255,255,255,0.3); margin-top: -2px;
    }
    .controls {
      display: flex; justify-content: center; align-items: center; gap: 24px;
    }
    .ctrl-btn {
      background: none; border: none; cursor: pointer; padding: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .ctrl-btn svg { fill: rgba(255,255,255,0.5); transition: fill 0.15s; }
    .ctrl-btn:hover svg { fill: #fff; }
    .ctrl-btn.play-btn svg { fill: #fff; }
    .ctrl-btn.play-btn:hover svg { fill: rgba(255,255,255,0.8); }

    .volume-row { display: flex; align-items: center; gap: 8px; }
    .volume-row svg { width: 14px; height: 14px; fill: rgba(255,255,255,0.3); flex-shrink: 0; }
    .volume-slider {
      flex: 1; height: 3px; -webkit-appearance: none; appearance: none;
      background: rgba(255,255,255,0.1); border-radius: 2px; outline: none;
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 10px; height: 10px;
      border-radius: 50%; background: #fff; cursor: pointer;
    }
    .vol-label { font-size: 10px; color: rgba(255,255,255,0.3); min-width: 24px; text-align: right; }

    .open-btn {
      width: 100%; padding: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; color: rgba(255,255,255,0.4); cursor: pointer; font-size: 12px;
      transition: all 0.15s; letter-spacing: 0.5px;
    }
    .open-btn:hover { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.2); }
    .now-playlist {
      flex: 1; overflow-y: auto; overflow-x: hidden; margin-top: 6px;
      scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent;
    }
    .now-playlist::-webkit-scrollbar { width: 3px; }
    .now-playlist::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    .now-pl-item {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 6px; border-radius: 6px; cursor: pointer;
      transition: background 0.15s; font-size: 11px; color: rgba(255,255,255,0.4);
    }
    .now-pl-item:hover { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.7); }
    .now-pl-item.active { background: rgba(255,255,255,0.08); color: #fff; font-weight: 600; }

    /* Sidebar */
    .sidebar {
      width: 48px; flex-shrink: 0; display: flex; flex-direction: column;
      align-items: center; padding: 12px 0; gap: 8px;
      background: rgba(0,0,0,0.3); border-right: 1px solid rgba(255,255,255,0.05);
      position: relative; z-index: 2;
    }
    .sidebar-btn {
      width: 36px; height: 36px; border-radius: 8px; border: none;
      background: none; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .sidebar-btn svg { fill: rgba(255,255,255,0.3); transition: fill 0.15s; }
    .sidebar-btn:hover svg { fill: rgba(255,255,255,0.6); }
    .sidebar-btn.active { background: rgba(255,255,255,0.08); }
    .sidebar-btn.active svg { fill: #fff; }

    /* Pages */
    .page { display: flex; flex: 1; overflow: hidden; transition: opacity 0.25s ease, transform 0.25s ease; }
    .page.hidden { display: none; opacity: 0; transform: translateX(-10px); }

    /* Library page */
    .library-panel {
      flex: 1; display: flex; flex-direction: column;
      padding: 16px; overflow: hidden;
    }
    .list-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 4px 0 8px; flex-shrink: 0;
    }
    .tracklist-title { font-size: 13px; color: rgba(255,255,255,0.5); font-weight: 600; }
    .match-all-btn {
      background: none; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px; color: rgba(255,255,255,0.4); font-size: 10px;
      padding: 3px 8px; cursor: pointer; transition: all 0.15s;
    }
    .match-all-btn:hover { color: #fff; border-color: rgba(255,255,255,0.3); }
    .list-content {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent;
    }
    .list-content::-webkit-scrollbar { width: 4px; }
    .list-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    /* Track items */
    .track-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 8px; border-radius: 8px; cursor: pointer;
      transition: background 0.15s;
    }
    .track-item:hover { background: rgba(255,255,255,0.05); }
    .track-item.active { background: rgba(255,255,255,0.1); }
    .track-info { flex: 1; min-width: 0; }
    .track-name {
      font-size: 12px; color: rgba(255,255,255,0.7);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .track-artist {
      font-size: 10px; color: rgba(255,255,255,0.3);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .track-item.active .track-name { color: #fff; font-weight: 600; }
    .track-match-btn {
      background: none; border: none; cursor: pointer; padding: 2px;
      opacity: 0.3; transition: opacity 0.15s; flex-shrink: 0;
    }
    .track-match-btn:hover { opacity: 1; }
    .track-match-btn svg { width: 14px; height: 14px; fill: rgba(255,255,255,0.5); }
    .track-has-lyrics { opacity: 0.15; }
    .track-has-lyrics svg { fill: #30d158; }

    /* Playlist items */
    .pl-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px; border-radius: 8px; cursor: pointer;
      transition: background 0.15s;
    }
    .pl-item:hover { background: rgba(255,255,255,0.05); }
    .pl-item.dragover { background: rgba(255,255,255,0.12); outline: 1px dashed rgba(255,255,255,0.3); }
    .pl-icon {
      width: 44px; height: 44px; border-radius: 8px;
      background: rgba(255,255,255,0.05); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .pl-icon img { width: 100%; height: 100%; object-fit: cover; }
    .pl-icon svg { width: 20px; height: 20px; fill: rgba(255,255,255,0.15); }
    .pl-info { flex: 1; min-width: 0; }
    .pl-name {
      font-size: 13px; color: rgba(255,255,255,0.7);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .pl-count { font-size: 10px; color: rgba(255,255,255,0.25); margin-top: 1px; }

    /* Context menu */
    .context-menu {
      display: none; position: fixed; z-index: 100;
      background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 4px 0; min-width: 150px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    .context-menu.show { display: block; }
    .ctx-item {
      padding: 7px 14px; font-size: 12px; color: rgba(255,255,255,0.7);
      cursor: pointer; transition: background 0.1s;
    }
    .ctx-item:hover { background: rgba(255,255,255,0.1); }
    .ctx-danger { color: #ff5f57; }
    .ctx-danger:hover { background: rgba(255,95,87,0.15); }


    /* Right panel: lyrics */
    .right-panel {
      flex: 1; position: relative; overflow: hidden;
      border-left: 1px solid rgba(255,255,255,0.05);
    }
    .lyrics-scroll {
      width: 100%; height: 100%; overflow-y: auto; overflow-x: hidden;
      scrollbar-width: none;
      mask-image: linear-gradient(to bottom, transparent 0%, black 12%, black 88%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 12%, black 88%, transparent 100%);
    }
    .lyrics-scroll::-webkit-scrollbar { display: none; }
    .lyrics-inner { padding: 40% 20px; }
    .lrc-line {
      padding: 8px 0;
      font-size: 15px;
      line-height: 1.5;
      color: rgba(255,255,255,0.2);
      transition: color 0.4s ease, font-size 0.4s ease, font-weight 0.3s ease, filter 0.4s ease;
      cursor: pointer;
      filter: blur(2px);
    }
    .lrc-line:hover { color: rgba(255,255,255,0.45); filter: blur(0); }
    .lrc-line.active {
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      filter: blur(0);
    }
    .lrc-line.near { color: rgba(255,255,255,0.35); filter: blur(1px); }
    .no-lyrics {
      display: flex; align-items: center; justify-content: center;
      height: 100%; color: rgba(255,255,255,0.2); font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="window">
    <div class="fluid-bg" id="fluidBg"></div>
    <div class="titlebar">
      <span>Player</span>
      <div class="titlebar-btns">
        <button class="titlebar-btn btn-min" id="minBtn"></button>
        <button class="titlebar-btn btn-close" id="closeBtn"></button>
      </div>
    </div>
    <div class="main-area">
      <!-- Sidebar -->
      <div class="sidebar">
        <button class="sidebar-btn active" id="tabPlay" title="播放">
          <svg width="20" height="20" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
        </button>
        <button class="sidebar-btn" id="tabLibrary" title="歌单">
          <svg width="20" height="20" viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z"/></svg>
        </button>
      </div>

      <!-- Page: Player -->
      <div class="page" id="pagePlay">
        <div class="left-panel">
          <div class="cover-wrap" id="coverWrap"></div>
          <div class="song-info">
            <div class="song-title" id="title">Dynamic Island Lyrics</div>
            <div class="song-artist" id="artist">--</div>
          </div>
          <div class="progress-wrap" id="progressWrap">
            <div class="progress-bar" id="progressBar"></div>
          </div>
          <div class="time-row">
            <span id="timeCur">0:00</span>
            <span id="timeTotal">0:00</span>
          </div>
          <div class="controls">
            <button class="ctrl-btn" id="prevBtn">
              <svg width="20" height="20" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            <button class="ctrl-btn play-btn" id="playBtn">
              <svg width="32" height="32" viewBox="0 0 24 24" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
            </button>
            <button class="ctrl-btn" id="nextBtn">
              <svg width="20" height="20" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
          </div>
          <div class="volume-row">
            <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
            <input type="range" class="volume-slider" id="volume" min="0" max="100" value="80" />
            <span class="vol-label" id="volLabel">80</span>
          </div>
          <button class="open-btn" id="openBtn">打开音乐文件</button>
          <div class="now-playlist" id="nowPlaylist"></div>
        </div>
        <div class="right-panel">
          <div class="lyrics-scroll" id="lyricsScroll">
            <div class="lyrics-inner" id="lyricsInner">
              <div class="no-lyrics" id="noLyrics">打开音乐文件开始播放</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Page: Library -->
      <div class="page hidden" id="pageLibrary">
        <div class="library-panel">
          <div class="list-header">
            <span class="tracklist-title" id="listTitle">歌单</span>
            <button class="match-all-btn" id="listActionBtn">新建歌单</button>
          </div>
          <button class="open-btn" id="openFolderBtn" style="margin:8px 0">添加文件夹为歌单</button>
          <div class="list-content" id="listContent"></div>
        </div>
      </div>
    </div>

    <!-- Context menu (global) -->
    <div class="context-menu" id="contextMenu">
      <div class="ctx-item" data-action="rename">重命名</div>
      <div class="ctx-item" data-action="cover">设置封面</div>
      <div class="ctx-item" data-action="addfiles">添加歌曲</div>
      <div class="ctx-item" data-action="addfolder">添加文件夹内歌曲</div>
      <div class="ctx-item ctx-danger" data-action="delete">删除歌单</div>
    </div>

  </div>
  <script src="player.js"></script>
</body>
</html>
